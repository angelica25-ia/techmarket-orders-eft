name: Reusable Security Scan

on:
  workflow_call:

jobs:
  security:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: app
        run: npm ci

      - name: Security Audit
        working-directory: app
        run: |
          npm audit --audit-level=high || true
