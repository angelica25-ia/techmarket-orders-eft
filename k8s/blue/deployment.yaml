apiVersion: apps/v1
kind: Deployment
metadata:
  name: techmarket-blue
  namespace: techmarket
  labels:
    app: techmarket-orders
    version: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: techmarket-orders
      version: blue
  template:
    metadata:
      labels:
        app: techmarket-orders
        version: green
    spec:
      containers:
      - name: orders
        image: 219964029915.dkr.ecr.us-east-1.amazonaws.com/techmarket-orders:10160a4158e5d680fd590b4ba14719ff107bf29d
        imagePullPolicy: Always
        ports:
        - containerPort: 3000

        envFrom:
        - configMapRef:
            name: techmarket-config

        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 10

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
